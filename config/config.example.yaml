project:
  name: KINTYRE-LIBRARY
  mode: audit

storage:
  music_root: /path/to/music

  database_dir: /path/to/kintyre/runtime/database
  reports_dir: /path/to/kintyre/runtime/reports
  logs_dir: /path/to/kintyre/runtime/logs
  cache_dir: /path/to/kintyre/runtime/cache
  previews_dir: /path/to/kintyre/runtime/preview
  staging_dir: /path/to/kintyre/runtime/staging

libraries:
  contemporary:
    name: CONTEMPORARY
    root: /path/to/music/CONTEMPORARY
    enabled: true
    profile: contemporary

  classical:
    name: CLASSICAL
    root: /path/to/music/CLASSICAL
    enabled: true
    profile: classical

protection:
  read_only: true
  allow_tag_writes: false
  allow_renames: false
  allow_moves: false
  allow_deletes: false

music_assistant:
  objective: clean_library
  local_music_path: /path/to/music
  container_music_path: /media
  providers:
    contemporary:
      host_path: /path/to/music/CONTEMPORARY
      container_path: /media/contemporary
    classical:
      host_path: /path/to/music/CLASSICAL
      container_path: /media/classical

scan:
  include:
    - mp3
    - flac
    - m4a
    - m4p
    - wma
    - wav
    - aif
    - aiff
    - ogg
  exclude_directories:
    - lost+found
  follow_symbolic_links: false

  # Artwork commissioning uses the supported HTTP/JSON-RPC API only.
  # Store the bearer token outside this repository and pass it with
  # --token-file or KINTYRE_MA_TOKEN.
  artwork_commissioning:
    enabled: false
    api_url: http://127.0.0.1:8095
    page_size: 250
    request_delay_seconds: 0.05
    runtime_dir: /path/to/kintyre/runtime/music-assistant
